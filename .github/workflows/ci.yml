name: CI/CD Demo

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt
      - run: pytest

  deploy:
    needs: build
    runs-on: windows-latest

    steps:
      - run: echo "Deploying application..."
